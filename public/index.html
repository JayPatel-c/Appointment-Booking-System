<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediCare - Online Appointment Booking</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <nav class="navbar glass-panel-strong">
        <div class="container nav-content">
            <a href="index.html" class="logo">
                <i class="fa-solid fa-notes-medical"></i> MediCare
            </a>
            <div class="nav-links">
                <a href="#booking" class="active">Book Appointment</a>
                <a href="login.html" class="btn btn-outline">Doctor Login</a>
            </div>
        </div>
    </nav>

    <main class="container main-content">
        <div class="hero-section">
            <h1 class="hero-title">Your Health is Our <span class="text-gradient">Top Priority</span></h1>
            <p class="hero-subtitle">Book an appointment with our specialist doctors online quickly and easily. Experience premium healthcare services at your fingertips.</p>
            <div class="hero-stats">
                <div class="stat-item">
                    <span class="stat-value">50+</span>
                    <span class="stat-label">Specialist Doctors</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value">10k+</span>
                    <span class="stat-label">Happy Patients</span>
                </div>
            </div>
        </div>

        <div class="booking-section">
            <div class="glass-panel form-container" id="booking">
                <h2><i class="fa-regular fa-calendar-check text-accent"></i> Book Appointment</h2>
                <form id="appointmentForm" novalidate>
                    <div class="form-group">
                        <label for="patientName">Full Name</label>
                        <div class="input-wrapper">
                            <i class="fa-regular fa-user"></i>
                            <input type="text" id="patientName" name="patient_name" placeholder="Firstname Lastname" required pattern="[A-Za-z\s]+" title="Only letters and spaces are allowed" oninput="this.value = this.value.replace(/[^A-Za-z\s]/g, '')">
                        </div>
                        <div class="field-error" id="nameError"></div>
                    </div>
                    
                    <div class="form-group">
                        <label for="patientPhone">Phone Number</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-phone"></i>
                            <input type="tel" id="patientPhone" name="patient_phone" placeholder="XXXXX XXXXX" required pattern="^[0-9]{5} [0-9]{5}$" maxlength="11" title="Phone number must be exactly 10 digits" oninput="let v=this.value.replace(/[^0-9]/g,'').slice(0,10); this.value=v.length>5?v.slice(0,5)+' '+v.slice(5):v">
                        </div>
                        <div class="field-error" id="phoneError"></div>
                    </div>

                    <div class="form-group">
                        <label for="doctorId">Select Doctor</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-user-doctor"></i>
                            <select id="doctorId" name="doctor_id" required>
                                <option value="" disabled selected>Loading doctors...</option>
                            </select>
                        </div>
                        <div class="field-error" id="doctorError"></div>
                    </div>

                    <div class="form-row">
                        <div class="form-group half-width">
                            <label for="appointmentDate">Date</label>
                            <div class="input-wrapper">
                                <i class="fa-regular fa-calendar"></i>
                                <input type="date" id="appointmentDate" name="appointment_date" required>
                            </div>
                            <div class="field-error" id="dateError"></div>
                        </div>

                        <div class="form-group half-width">
                            <label for="timeSlot">Time</label>
                            <div class="input-wrapper">
                                <i class="fa-regular fa-clock"></i>
                                <select id="timeSlot" name="time_slot" required>
                                    <option value="" disabled selected>Select time</option>
                                    <option value="09:00 AM">09:00 AM</option>
                                    <option value="10:00 AM">10:00 AM</option>
                                    <option value="11:00 AM">11:00 AM</option>
                                    <option value="01:00 PM">01:00 PM</option>
                                    <option value="02:00 PM">02:00 PM</option>
                                    <option value="03:00 PM">03:00 PM</option>
                                    <option value="04:00 PM">04:00 PM</option>
                                </select>
                            </div>
                            <div class="field-error" id="timeError"></div>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block" id="submitBtn">
                        Confirm Booking <i class="fa-solid fa-arrow-right"></i>
                    </button>
                    <div id="formMessage" class="message hidden"></div>
                </form>
            </div>
        </div>
    </main>

    <script src="script.js?v=2"></script>
</body>
</html>
