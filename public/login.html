<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Login - MediCare</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body style="display: flex; justify-content: center; align-items: center; min-height: 100vh;">
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="glass-panel form-container" style="max-width: 400px; width: 100%; z-index: 10;">
        <h2 style="margin-bottom: 10px; text-align: center;"><i class="fa-solid fa-user-doctor text-accent"></i> Doctor Login</h2>
        <p style="text-align: center; color: var(--text-muted); margin-bottom: 25px; font-size: 0.9rem;">Sign in to view your patient appointments.</p>
        
        <form id="loginForm" novalidate>
            <div class="form-group">
                <label for="username">Username</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="username" name="username" placeholder="e.g. john" required>
                </div>
                <div class="field-error" id="loginUsernameError"></div>
            </div>
            
            <div class="form-group" style="margin-bottom: 25px;">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                    <i class="fa-solid fa-eye password-toggle" id="togglePassword"></i>
                </div>
                <div class="field-error" id="loginPasswordError"></div>
            </div>

            <button type="submit" class="btn btn-primary btn-block" id="loginSubmitBtn">
                Sign In <i class="fa-solid fa-right-to-bracket"></i>
            </button>
            <div id="formMessage" class="message hidden"></div>
        </form>
        
        <div style="text-align: center; margin-top: 20px;">
            <a href="index.html" style="color: var(--text-muted); text-decoration: none; font-size: 0.9rem;"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
        </div>
    </div>

    <script src="script.js?v=3"></script>
</body>
</html>
